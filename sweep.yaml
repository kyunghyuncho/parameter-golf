program: train.py
method: bayes
metric:
  name: val_bpb
  goal: minimize
parameters:
  learning_rate:
    distribution: log_uniform_values
    min: 1e-4
    max: 1e-2
  weight_decay:
    distribution: uniform
    min: 0.0
    max: 0.1
  gradient_clip_val:
    distribution: uniform
    min: 0.1
    max: 2.0
  bptt_steps:
    distribution: categorical
    values: [128, 256, 512]
  batch_size:
    distribution: categorical
    values: [4096, 8192, 16384]
