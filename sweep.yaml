program: train.py
method: bayes
metric:
  name: val_bpb
  goal: minimize
parameters:
  learning_rate:
    distribution: log_uniform_values
    min: 1e-4
    max: 1.0
  weight_decay:
    distribution: log_uniform_values
    min: 1e-3
    max: 0.1
  gradient_clip_val:
    distribution: uniform
    min: 0.1
    max: 2.0
  bptt_steps:
    distribution: categorical
    values: [128, 256, 512, 1024, 2048]
  batch_size:
    distribution: categorical
    values: [32768, 65536, 131072]
