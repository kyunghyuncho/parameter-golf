program: train.py
method: bayes
metric:
  name: val_bpb
  goal: minimize
parameters:
  learning_rate:
    distribution: log_uniform_values
    min: 1e-6
    max: 1e-2
  beta1:
    distribution: categorical
    values: [0.8, 0.85, 0.9, 0.92, 0.95, 0.98, 0.99]
  beta2:
    distribution: categorical
    values: [0.8, 0.9, 0.95, 0.98, 0.99, 0.995, 0.999, 0.9999]
  gradient_clip_val:
    distribution: uniform
    min: 0.1
    max: 2.0
  bptt_steps:
    distribution: categorical
    values: [128, 256, 512, 1024, 2048]
  batch_size:
    distribution: categorical
    values: [32768, 65536, 131072, 262144, 524288, 1048576, 2097152]
  architecture:
    distribution: categorical
    # values: ["shallow", "medium", "deep", "fp8_medium"]
    # remove "shallow", "medium" and "deep" in bf16, since we ran them already.
    values: ["fp8_medium"]
  use_qat:
    distribution: categorical
    values: [true, false]
